<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevForge</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-textarea: #0f172a;
            --border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --danger: #f43f5e;
            --danger-hover: #e11d48;
            --success: #10b981;
            --success-hover: #059669;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            padding: 28px;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        .app-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-title span {
            color: var(--accent);
        }

        .version-tag {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .workspace-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (min-width: 768px) {
            .workspace-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        textarea {
            width: 100%;
            height: 220px;
            background: var(--bg-textarea);
            color: #34d399;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            resize: vertical;
            transition: all 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .actions-panel {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .action-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .group-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .actions-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-actions {
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid var(--border);
            padding-top: 14px;
            margin-top: 4px;
        }

        .btn-limpar {
            background: rgba(244, 63, 94, 0.1);
            color: var(--danger);
            border: 1px solid rgba(244, 63, 94, 0.3);
        }

        .btn-limpar:hover {
            background: var(--danger);
            color: white;
        }

        .btn-copiar {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
            font-size: 0.75rem;
            padding: 5px 12px;
            border-radius: 6px;
        }

        .btn-copiar:hover {
            background: var(--success);
            color: white;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1 class="app-title">Dev<span>Forge</span></h1>
            <span class="version-tag">v3.0 Pro</span>
        </header>
        
        <div class="workspace-grid">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-label">Entrada</span>
                </div>
                <textarea id="entrada" placeholder="Cole seu código, texto, JSON ou token aqui..."></textarea>
            </div>
            
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-label">Resultado</span>
                    <button class="btn-copiar" onclick="copiarResultado()">Copiar Resultado</button>
                </div>
                <textarea id="saida" readonly placeholder="O resultado processado aparecerá aqui..."></textarea>
            </div>
        </div>

        <div class="actions-panel">
            <!-- Grupo: Formatadores & Inspetores -->
            <div class="action-group">
                <span class="group-title">Formatadores e Inspetores</span>
                <div class="actions-grid">
                    <button onclick="formatarJSON()">Formatar JSON</button>
                    <button onclick="inspecionarJWT()">Inspecionar JWT</button>
                </div>
            </div>

            <!-- Grupo: Codificadores -->
            <div class="action-group">
                <span class="group-title">Codificação</span>
                <div class="actions-grid">
                    <button onclick="codificarBase64()">Codificar Base64</button>
                    <button onclick="decodificarBase64()">Decodificar Base64</button>
                    <button onclick="codificarURL()">Codificar URL</button>
                    <button onclick="decodificarURL()">Decodificar URL</button>
                </div>
            </div>

            <!-- Grupo: Geradores -->
            <div class="action-group">
                <span class="group-title">Geradores</span>
                <div class="actions-grid">
                    <button onclick="gerarSenha()">Gerar Senha</button>
                    <button onclick="gerarUUID()">Gerar UUID v4</button>
                    <button onclick="gerarTimestampAtual()">Timestamp Atual</button>
                    <button onclick="converterTimestampParaData()">Timestamp ➔ Data</button>
                </div>
            </div>

            <!-- Grupo: Hashes & Criptografia -->
            <div class="action-group">
                <span class="group-title">Hashes (Criptografia)</span>
                <div class="actions-grid">
                    <button onclick="gerarHashSHA256()">SHA-256</button>
                    <button onclick="gerarHashSHA512()">SHA-512</button>
                </div>
            </div>

            <div class="footer-actions">
                <button class="btn-limpar" onclick="limparTudo()">Limpar Tudo</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
                      </html>
